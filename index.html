<script>
// 缓存清除: 检测版本，不匹配则刷新（保留数据）
(function(){
  var v=document.querySelector('meta[name="version"]')?.content;
  var cv=localStorage.getItem('_app_version');
  if(v&&cv&&v!==cv){localStorage.setItem('_app_version',v);location.reload();return;}
  if(v&&!cv)localStorage.setItem('_app_version',v);
  // PWA缓存穿透：后台拉取最新版本号，不一致则刷新
  if(cv){
    fetch('https://raw.githubusercontent.com/qq365098020/ops-rush/main/manifest.json?_='+Date.now(),{cache:'no-store'})
      .then(function(r){return r.json()})
      .then(function(d){if(d.version&&d.version!==cv){localStorage.setItem('_app_version',d.version);location.reload()}})
      .catch(function(){});
  }
})();
const DEFAULT_TASKS = [
  {id:'anti_money_laundering',name:'反洗钱检查',type:'rolling',severity:'red',intervalDays:2,lastCompleted:null,reviews:[],note:'',typeLabel:'滚动 · 每2天',desc:'从上次完成日起计算，满2天未完成则标红预警。周六关门日计入天数。'},
  {id:'atm_cleaning',name:'ATM清机',type:'rolling',severity:'red',intervalDays:4,lastCompleted:null,reviews:[],note:'',manualResetDates:[],typeLabel:'滚动 · 每4天',desc:'',linkedFrom:'inventory_check'},
  {id:'atm_register',name:'ATM机登记本',type:'rolling',severity:'yellow',intervalDays:4,lastCompleted:null,reviews:[],note:'',typeLabel:'滚动 · 每4天',desc:'至少每4天登记一次。周六关门日计入天数。'},
  {id:'inventory_check',name:'每旬查库&改密码&登记',type:'旬',severity:'red',multiCompletion:true,lastCompleted:null,reviews:[],note:'',completions:{},typeLabel:'月度 · 每旬',desc:'每月3次：1-10号、11-20号、21-31号各完成一次。每旬开始即持续提醒。周六关门日截止日提前至周五。完成本任务会自动重置"ATM清机"计时。',linkTo:'atm_cleaning'},
  {id:'security_study',name:'安保本学习记录',type:'monthly_range',severity:'yellow',multiCompletion:true,lastCompleted:null,reviews:[],note:'',monthParts:[{label:'第1篇',before:15},{label:'第2篇',after:25}],typeLabel:'月度 · 2篇/月',desc:'第1篇：15号之前完成。第2篇：25号之后完成（抄中心社内容）。'},
  {id:'counterfeit_surrender',name:'反假币上缴登记',type:'monthly_fixed',severity:'green',day:1,postponeSat:true,reviews:[],note:'',lastCompleted:null,typeLabel:'月度 · 每月1号',desc:'每月第1天完成。遇周六推迟至周日。'},
  {id:'monthly_stats',name:'每月统计业务量',type:'monthly_fixed',severity:'yellow',day:1,postponeSat:true,reviews:[],note:'',lastCompleted:null,typeLabel:'月度 · 每月1号',desc:'每月第1天完成。遇周六推迟至周日。'},
  {id:'ticket_binding',name:'装订票',type:'monthly_fixed',severity:'yellow',day:1,postponeSat:true,reviews:[],note:'若当月某周六为网点轮休关门日，需在该日期对应的票据后附加一张说明纸，格式为：网点轮休：北环路分理处 YYYY.MM.DD 周末轮休无票（日期填写实际关门日期）',lastCompleted:null,typeLabel:'月度 · 每月1号',desc:'装订上月全部票据。遇周六推迟至周日。操作备注常驻显示。',hasPersistentNote:true},
  {id:'subject_print',name:'科目打印 7156/7232/1212/7608/7153',type:'monthly_fixed',severity:'yellow',day:1,postponeSat:true,reviews:[],note:'',lastCompleted:null,typeLabel:'月度 · 每月1号',desc:'遇周六推迟至周日。'},
  {id:'call_9999',name:'打9999',type:'monthly_multi',severity:'red',days:[],lastNDays:4,reviews:[],note:'',completions:{},typeLabel:'月度 · 最后4天',desc:''},
  {id:'balance_print',name:'科目余额查询及打印 1221/2011/2014/2232/2241/2314',type:'monthly_fixed',severity:'red',day:1,postponeSat:true,reviews:[],note:'在6301科目号处依次输入以上6个科目查询余额；有余额的复制账号，在6303中粘贴账号，按整月打印，所有科目打印在同一张纸上，仅在第一页签名。',lastCompleted:null,typeLabel:'月度 · 每月1号',desc:'遇周六推迟至周日。操作备注常驻显示。',hasPersistentNote:true},
  {id:'personal_security',name:'个人安保学习本',type:'monthly_fixed',severity:'yellow',day:-2,postponeSat:true,reviews:[],note:'',lastCompleted:null,typeLabel:'月度 · 每月最后1天',desc:'每月最后1天完成。遇周六推迟至周日。'},
{id:'alarm_test',name:'测试报警器并登记',type:'monthly_fixed',severity:'red',day:15,postponeSat:'fri',reviews:[],note:'',lastCompleted:null,typeLabel:'月度 · 每月15号',desc:'每月15号完成。遇周六提前至周五。'},
  {id:'wall_safety',name:'墙上安全检查',type:'monthly_fixed',severity:'yellow',day:15,postponeSat:true,reviews:[],note:'',lastCompleted:null,typeLabel:'月度 · 每月15号',desc:'每月15号完成。遇周六推迟至周日。'},
  {id:'computer_log',name:'计算机操作日志',type:'monthly_multi',severity:'yellow',days:[2,17],multiCompletion:true,reviews:[],note:'',lastCompleted:null,completions:{},typeLabel:'月度 · 2号和17号',desc:'每月2号和17号各写一次。'},
  {id:'safety_check',name:'安全检查',type:'weekly',severity:'yellow',weekday:0,multiCompletion:true,monthlyTarget:4,weekStart:1,reviews:[],note:'',lastCompleted:null,typeLabel:'每周 · 周一~周日 · 4次/月',desc:'每周一至周日期间完成1次，本月共需4次。检查项目：应急灯、灭火器、报警器、电话、十分钟监控。'}
];

// ===== DATE UTILS =====
const TODAY=()=>{const d=new Date();d.setHours(0,0,0,0);return d};
const fmtDate=d=>d?`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`:'--';
const fmtDateShort=d=>d?`${d.getMonth()+1}/${d.getDate()}`:'--';
const daysBetween=(a,b)=>Math.floor((b-a)/(86400000));
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r};
const isSaturday=d=>d.getDay()===6;
function postponeIfSaturday(d){const r=new Date(d);if(isSaturday(r))r.setDate(r.getDate()+1);return r}
function postponeToFriday(d){const r=new Date(d);if(isSaturday(r))r.setDate(r.getDate()-1);return r}
const chDate=h=>typeof h==='string'?h:h.date;
const dateKey=d=>`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
function resolveDay(taskDay,year,month){if(taskDay===-2)return new Date(year,month+1,0).getDate();if(taskDay===-1)return new Date(year,month+1,0).getDate()-1;return taskDay}
function monthlyMultiTargets(task,year,month){
  return(task.days||[]).map(day=>{
    let target=day===1?new Date(year,month+1,1):new Date(year,month,day);
    target=day===1?postponeIfSaturday(target):postponeToFriday(target);
    const key=dateKey(target);
    return{day,target,key,done:task.completions&&task.completions[key]};
  }).sort((a,b)=>a.target-b.target);
}
function latestHistoryIso(task){
  if(!task.completionHistory||!task.completionHistory.length)return null;
  let latest=null;
  task.completionHistory.forEach(h=>{const p=chDate(h).split('-');if(p.length===3){const d=new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]));if(!latest||d>latest)latest=d}});
  return latest?latest.toISOString():null;
}
function xunEntryDateKey(xunKey,entry){
  const parts=xunKey.split('-').map(Number);
  if(parts.length!==3||!entry||!entry.date)return null;
  const match=entry.date.match(/(\d+)月(\d+)日/);
  if(!match)return null;
  return `${parts[0]}-${parseInt(match[1])-1}-${parseInt(match[2])}`;
}

// ===== APP CLASS =====
class App {
  constructor(){
    this.tasks=[];this.currentPage='pageDashboard';this.activeTab='overdue';
    this._calMonth=0;this._calYear=0;this._calSelected=null;this._calTaskId=null;this._miniCalMonth=new Date().getMonth();this._miniCalYear=new Date().getFullYear();
    this.setupViewportVars();this.load();this.setupNav();this.updateDate();
    // 首次渲染
    this.switchPage('pageDashboard');
    setInterval(()=>this.render(),60000);
  }

  load(){
    try{
      const raw=localStorage.getItem('opsrush_data');
      if(raw){const data=JSON.parse(raw);this.tasks=data.tasks||[];this.tasks=this.tasks.filter(t=>t.id!=='cash_zero');const ids=new Set(this.tasks.map(t=>t.id));DEFAULT_TASKS.forEach(dt=>{if(!ids.has(dt.id))this.tasks.push(JSON.parse(JSON.stringify(dt)))})}
      else this.tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
      // Migration: sync default properties for existing tasks
      this.tasks.forEach(t=>{
        const def=DEFAULT_TASKS.find(d=>d.id===t.id);
        if(def){
          if(def.day!==undefined&&t.day!==undefined&&t.day!==def.day){t.day=def.day;t.typeLabel=def.typeLabel;t.desc=def.desc} if(def.weekday!==undefined&&t.weekday!==undefined&&t.weekday!==def.weekday){t.weekday=def.weekday;t.typeLabel=def.typeLabel;t.desc=def.desc}
          // 滚动任务: 同步intervalDays和描述
          if(t.type==='rolling'&&def.intervalDays!==undefined){
            if(t.intervalDays!==def.intervalDays){t.intervalDays=def.intervalDays}
            t.typeLabel=def.typeLabel;t.desc=def.desc;
          }
          // 同步联动字段 linkTo/linkedFrom（使旧数据能触发联动重置）
          if(def.linkTo!==undefined)t.linkTo=def.linkTo;
          if(def.linkedFrom!==undefined)t.linkedFrom=def.linkedFrom;
        }
        if(t.type==='旬'||t.type==='monthly_range'||t.type==='monthly_multi')t.multiCompletion=true;
        if(t.id==='computer_log'){t.type='monthly_multi';t.days=[2,17];t.multiCompletion=true;if(!t.completions)t.completions={};delete t.weekday;delete t.monthlyTarget}
        if(t.type==='rolling'&&!t.completionHistory)t.completionHistory=[];
        // 修复: rolling任务 lastCompleted 为空时从 completionHistory 恢复
        if(t.type==='rolling'&&!t.lastCompleted&&t.completionHistory&&t.completionHistory.length){
          let latest=null;
          t.completionHistory.forEach(h=>{const p=chDate(h).split('-');if(p.length===3){const d=new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]));if(!latest||d>latest)latest=d}});
          if(latest)t.lastCompleted=latest.toISOString();
        }
      });
      // 强制修复: 反洗钱检查 intervalDays 必须为 2
      const aml=this.tasks.find(t=>t.id==='anti_money_laundering');
      if(aml&&aml.intervalDays!==2){aml.intervalDays=2;aml.typeLabel='滚动 · 每2天';aml.desc='从上次完成日起计算，满2天未完成则标红预警。周六关门日计入天数。'}
      this.save();
    }catch(e){this.tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS))}
  }

  save(){localStorage.setItem('opsrush_data',JSON.stringify({tasks:this.tasks,savedAt:new Date().toISOString()}))}

  setupViewportVars(){
    const update=()=>{
      const vv=window.visualViewport;
      const gap=vv?Math.max(0,window.innerHeight-vv.height-vv.offsetTop):0;
      document.documentElement.style.setProperty('--viewport-bottom-gap',`${Math.ceil(gap)}px`);
    };
    update();
    window.addEventListener('resize',update,{passive:true});
    if(window.visualViewport){
      window.visualViewport.addEventListener('resize',update,{passive:true});
      window.visualViewport.addEventListener('scroll',update,{passive:true});
    }
  }

  updateDate(){
    const d=TODAY();const wk=['日','一','二','三','四','五','六'];
    document.getElementById('dateDisplay').textContent=`${d.getMonth()+1}月${d.getDate()}日 周${wk[d.getDay()]}`;
    const v=document.querySelector('meta[name="version"]')?.content;
    const vd=document.getElementById('versionDisplay');
    if(v&&vd)vd.textContent='v'+v;
  }

  setupNav(){
    document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>this.switchPage(item.dataset.page))});
    document.getElementById('detailModal').addEventListener('click',e=>{if(e.target.classList.contains('modal-overlay'))this.closeDetail()});
    document.getElementById('calOverlay').addEventListener('click',e=>{if(e.target.classList.contains('cal-overlay'))this.closeCalOverlay()});
  }

  switchPage(page){
    this.currentPage=page;
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n=>{n.classList.toggle('active',n.dataset.page===page)});
    if(page==='pageDashboard')this.renderDashboard();
    if(page==='pageTasks')this.renderTasks();
  }

  // ===== STATUS CALCULATION =====
  getTaskStatus(task){
    const today=TODAY();
    
    if(task.type==='rolling'){
      // 安全网: lastCompleted为空时尝试从completionHistory恢复
      if(!task.lastCompleted&&task.completionHistory&&task.completionHistory.length){
        let latest=null;
        task.completionHistory.forEach(h=>{const p=chDate(h).split('-');if(p.length===3){const d=new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]));if(!latest||d>latest)latest=d}});
        if(latest){task.lastCompleted=latest.toISOString();this.save()}
      }
      if(!task.lastCompleted)return{status:'pending',label:'从未完成',dueDate:null,daysLeft:null,overdue:true};
      const last=new Date(task.lastCompleted);last.setHours(0,0,0,0);
      let dueDate=addDays(last,task.intervalDays);
      if(task.postponeSat===true&&isSaturday(dueDate))dueDate=postponeIfSaturday(dueDate);
      else if(isSaturday(dueDate))dueDate=postponeToFriday(dueDate);
      const daysLeft=daysBetween(today,dueDate);
      if(daysLeft<0)return{status:'overdue',label:`逾期${-daysLeft}天`,dueDate,daysLeft,overdue:true};
      if(daysLeft===0)return{status:'today',label:'今天到期',dueDate,daysLeft:0,overdue:false};
      return{status:'ok',label:`还有${daysLeft}天`,dueDate,daysLeft,overdue:false};
    }
    if(task.type==='monthly_fixed'||task.type==='monthly_multi'){
      if(task.type==='monthly_multi')return this.getMultiStatus(task,today);
      const y=today.getFullYear(),m=today.getMonth();
      // Step 1: 计算当月目标日期
      let target=new Date(y,m,resolveDay(task.day,y,m));
      if(task.postponeSat===true)target=postponeIfSaturday(target);else if(task.postponeSat==='fri')target=postponeToFriday(target);
      // Step 2: 检查当月是否已完成（完成日期 >= 当月1号）
      if(task.lastCompleted){
        const lc=new Date(task.lastCompleted);lc.setHours(0,0,0,0);
        if(lc>=new Date(y,m,1)){
          // 当月已完成 → 推进到下月显示
          let nm=m+1,ny=y;if(nm>11){nm=0;ny++}
          let nextTarget=new Date(ny,nm,resolveDay(task.day,ny,nm));
          if(task.postponeSat===true)nextTarget=postponeIfSaturday(nextTarget);else if(task.postponeSat==='fri')nextTarget=postponeToFriday(nextTarget);
          return{status:'done',label:`已完成 · 下次${fmtDateShort(nextTarget)}`,dueDate:nextTarget,daysLeft:daysBetween(today,nextTarget),overdue:false};
        }
      }
      // Step 2.5: 检查上个月是否漏做了（个人安保学习本这类跨月任务）
      const lastM=m===0?11:m-1;const lastY=m===0?y-1:y;
      let lastTarget=new Date(lastY,lastM,resolveDay(task.day,lastY,lastM));
      if(task.postponeSat===true)lastTarget=postponeIfSaturday(lastTarget);else if(task.postponeSat==='fri')lastTarget=postponeToFriday(lastTarget);
      const lc=task.lastCompleted?new Date(task.lastCompleted):null;if(lc)lc.setHours(0,0,0,0);
      if(lastTarget<today&&target>=today&&(!lc||lc<lastTarget)){
        const daysLeft=daysBetween(today,target);
        return{status:'missed',label:`上月未完成 · 还有${daysLeft}天`,dueDate:target,daysLeft,overdue:true};
      }
      // Step 3: 未完成 → 基于当月目标判断逾期/今天/即将
      const daysLeft=daysBetween(today,target);
      if(task.remindFrom&&today.getDate()<task.remindFrom&&daysLeft>0)return{status:'waiting',label:`${task.remindFrom}号起提醒`,dueDate:target,daysLeft,overdue:false};
      if(daysLeft<0)return{status:'overdue',label:`逾期${-daysLeft}天`,dueDate:target,daysLeft,overdue:true};
      if(daysLeft===0)return{status:'today',label:'今天到期',dueDate:target,daysLeft:0,overdue:false};
      return{status:'ok',label:`还有${daysLeft}天`,dueDate:target,daysLeft,overdue:false};
    }
    if(task.type==='旬')return this.getXunStatus(task,today);
    if(task.type==='monthly_range')return this.getMonthlyRangeStatus(task,today);
    if(task.type==='monthly_flexible')return this.getFlexibleStatus(task,today);
    if(task.type==='weekly'&&task.weekStart!==undefined)return this.getWeekCycleStatus(task,today);
    if(task.type==='weekly'){
      const diff=(task.weekday-today.getDay()+7)%7;
      // Count monthly completions for multi tasks
      const countMonthly=()=>{
        if(!task.completionHistory)return 0;
        const m=today.getMonth(),y=today.getFullYear();
        return task.completionHistory.filter(h=>{const p=chDate(h).split('-');return parseInt(p[0])===y&&parseInt(p[1])===m}).length;
      };
      const target=addDays(today,diff===0?0:diff);const daysLeft=diff;
      const isCompleteToday=()=>{
        if(!task.lastCompleted)return false;
        const lc=new Date(task.lastCompleted);lc.setHours(0,0,0,0);
        return daysBetween(lc,today)===0;
      };
      if(isCompleteToday()){
        if(task.multiCompletion){
          const cnt=countMonthly();const mxt=task.monthlyTarget||4;
          const nextSunday=addDays(today,7);
          if(cnt>=mxt)return{status:'done',label:`已完成 ${cnt}/${mxt} · 本月全部完成`,dueDate:nextSunday,daysLeft:7,overdue:false};
          return{status:'done',label:`已完成 ${cnt}/${mxt} · 下次${fmtDateShort(nextSunday)}`,dueDate:nextSunday,daysLeft:7,overdue:false};
        }
        const t=addDays(today,7);return{status:'done',label:`已完成 · 下次${fmtDateShort(t)}`,dueDate:t,daysLeft:7,overdue:false};
      }
      if(daysLeft<0)return{status:'overdue',label:`逾期${-daysLeft}天`,dueDate:target,daysLeft,overdue:true};
      if(daysLeft===0)return{status:'today',label:'今天到期',dueDate:target,daysLeft:0,overdue:false};
      // Weekly: check if last week was missed (daysLeft>0 means weekday already passed this week)
      if(daysLeft>0){
        const lastTarget=addDays(today,-(7-daysLeft));
        if(task.lastCompleted){const lc=new Date(task.lastCompleted);lc.setHours(0,0,0,0);
          if(lc<lastTarget)return{status:'overdue',label:`上周未完成`,dueDate:target,daysLeft:-(7-daysLeft),overdue:true};
        }else{return{status:'overdue',label:`上周未完成`,dueDate:target,daysLeft:-(7-daysLeft),overdue:true}}
      }
      if(task.multiCompletion){const cnt=countMonthly();const mxt=task.monthlyTarget||4;if(cnt===0)return{status:'pending',label:`本月待开始 · 0/${mxt}`,dueDate:target,daysLeft,overdue:false};return{status:'ok',label:`还有${daysLeft}天 · 已完成${cnt}/${mxt}`,dueDate:target,daysLeft,overdue:false};}
      return{status:'ok',label:`还有${daysLeft}天`,dueDate:target,daysLeft,overdue:false};
    }
    return{status:'unknown',label:'--',dueDate:null,daysLeft:null,overdue:false};
  }

  getXunStatus(task,today){
    const d=today.getDate();const y=today.getFullYear(),m=today.getMonth();
    if(!task.completions)task.completions={};
    // Count monthly completions (3 periods per month)
    const monthlyCount=[1,2,3].filter(i=>{const k=`${y}-${m}-${i}`;const v=task.completions[k];return v&&(Array.isArray(v)?v.length>0:true)}).length;
    // Determine current旬 index: 1=1-10, 2=11-20, 3=21-end
    let xunIdx,xunEnd;
    if(d<=10){xunIdx=1;xunEnd=10}
    else if(d<=20){xunIdx=2;xunEnd=20}
    else{xunIdx=3;xunEnd=new Date(y,m+1,0).getDate()}
    // Check if current旬 is completed
    const xunKey=`${y}-${m}-${xunIdx}`;
    const xunData=task.completions[xunKey];
    if(xunData&&(Array.isArray(xunData)?xunData.length>0:true)){
      // Find next旬's target date for display
      let nextXunStart,nextXunIdx;
      if(xunIdx<3){nextXunIdx=xunIdx+1;nextXunStart=new Date(y,m,(xunIdx)*10+1)}
      else{nextXunIdx=1;nextXunStart=new Date(y,m+1,1)}
      return{status:'done',label:`已完成 ${monthlyCount}/3`,dueDate:nextXunStart,daysLeft:daysBetween(today,nextXunStart),overdue:false};
    }
    let xunEndTarget=new Date(y,m,xunEnd);
    if(isSaturday(xunEndTarget))xunEndTarget=postponeToFriday(xunEndTarget);
    const xunDaysLeft=daysBetween(today,xunEndTarget);
    if(xunDaysLeft<0)return{status:'overdue',label:`本旬已逾期 ${monthlyCount}/3`,dueDate:xunEndTarget,daysLeft:xunDaysLeft,overdue:true,isXun:true};
    // 计算剩余工作日（排除周六）
    let rd=0;const cd=new Date(today);cd.setDate(cd.getDate()+1);
    while(cd<=xunEndTarget){if(cd.getDay()!==6)rd++;cd.setDate(cd.getDate()+1)}
    return{status:'pending',label:`剩余${rd}天 · ${monthlyCount}/3`,dueDate:xunEndTarget,daysLeft:xunDaysLeft,overdue:false,isXun:true};
  }

  getWeekCycleStatus(task,today){
    const y=today.getFullYear(),m=today.getMonth();
    // 计算本周周一 (weekStart=1)
    const dow=today.getDay();
    const monOff=dow===0?6:dow-1;
    const monday=new Date(today);monday.setDate(today.getDate()-monOff);monday.setHours(0,0,0,0);
    const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(0,0,0,0);
    const countMonthly=()=>{if(!task.completionHistory)return 0;return task.completionHistory.filter(h=>{const p=chDate(h).split('-');return parseInt(p[0])===y&&parseInt(p[1])===m}).length};
    const isThisWeek=()=>{if(!task.completionHistory)return false;const s=sunday.getTime()+86400000;return task.completionHistory.some(h=>{const p=chDate(h).split('-');if(p.length<3)return false;const d=new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]));return d.getTime()>=monday.getTime()&&d.getTime()<s})};
    const cnt=countMonthly();const mxt=task.monthlyTarget||4;
    if(cnt>=mxt){const nm=new Date(monday);nm.setDate(nm.getDate()+7);return{status:'done',label:`已完成 ${cnt}/${mxt} · 本月全部完成`,dueDate:nm,daysLeft:7,overdue:false}}
    if(isThisWeek()){const nm=new Date(monday);nm.setDate(nm.getDate()+7);return{status:'ok',label:`本周已完成 · ${cnt}/${mxt}`,dueDate:nm,daysLeft:7,overdue:false}}
    const dl=daysBetween(today,sunday);
    if(dl<0)return{status:'overdue',label:`上周未完成 · ${cnt}/${mxt}`,dueDate:sunday,daysLeft:dl,overdue:true};
    if(dl===0)return{status:'today',label:`今天截止 · ${cnt}/${mxt}`,dueDate:sunday,daysLeft:0,overdue:false};
    // 计算剩余工作日（排除周六）
    let rd=0;const cd=new Date(today);cd.setDate(cd.getDate()+1);
    while(cd<=sunday){if(cd.getDay()!==6)rd++;cd.setDate(cd.getDate()+1)}
    return{status:'pending',label:`剩余${rd}天 · ${cnt}/${mxt}`,dueDate:sunday,daysLeft:dl,overdue:false};
  }

  getMultiStatus(task,today){
    const m=today.getMonth(),y=today.getFullYear();
    // lastNDays mode: dynamic last N days of current month
    if(task.lastNDays){
      if(!task.completions)task.completions={};
      const monthEnd=new Date(y,m+1,0);
      const lastDay=monthEnd.getDate();
      const targets=[];
      let d=lastDay;
      while(targets.length<task.lastNDays&&d>=1){
        const target=new Date(y,m,d);
        if(target.getDay()!==6){
          const key=`${target.getFullYear()}-${target.getMonth()}-${target.getDate()}`;
          const done=task.completions&&task.completions[key];
          targets.unshift({target,key,done});
        }
        d--;
      }
      const pending=targets.filter(t=>!t.done);
      if(!pending.length)return{status:'done',label:'本月全部完成',dueDate:null,daysLeft:null,overdue:false};
      const firstPending=pending[0];
      const dl=daysBetween(today,firstPending.target);
      const fourthToLast=targets.length?targets[0].target:new Date(y,m,1);
      if(today<fourthToLast)return{status:'ok',label:`还有${daysBetween(today,fourthToLast)}天开始 · 共${task.lastNDays}次`,dueDate:fourthToLast,daysLeft:daysBetween(today,fourthToLast),overdue:false};
      if(dl<0)return{status:'overdue',label:`逾期${-dl}天 · 还剩${pending.length}次`,dueDate:firstPending.target,daysLeft:dl,overdue:true};
      if(dl===0)return{status:'today',label:`今天到期 · 还剩${pending.length}次`,dueDate:firstPending.target,daysLeft:0,overdue:false};
      return{status:'pending',label:`还剩${pending.length}次 · 截止${fmtDateShort(targets[targets.length-1].target)}`,dueDate:firstPending.target,daysLeft:dl,overdue:false};
    }
    // Original cycle mode
    let cycleMonth,cycleYear;
    const hasCycle=task.days&&task.days.some(d=>d>=25);
    if(hasCycle&&today.getDate()>=25){cycleMonth=m;cycleYear=y}
    else if(hasCycle){cycleMonth=m===0?11:m-1;cycleYear=m===0?y-1:y}
    else{cycleMonth=m;cycleYear=y}
    const targets=monthlyMultiTargets(task,cycleYear,cycleMonth);
    const pending=targets.filter(t=>!t.done);
    if(!pending.length){
      const nextTargets=monthlyMultiTargets(task,cycleYear,cycleMonth+1);
      const nextPending=nextTargets.filter(t=>!t.done);
      if(!nextPending.length)return{status:'done',label:'本月全部完成',dueDate:null,daysLeft:null,overdue:false};
      const u=nextPending[0];
      const dl=daysBetween(today,u.target);
      if(dl<0)return{status:'overdue',label:`逾期${-dl}天 · 还剩${nextPending.length}次`,dueDate:u.target,daysLeft:dl,overdue:true};
      if(dl===0)return{status:'today',label:`今天到期 · 还剩${nextPending.length}次`,dueDate:u.target,daysLeft:0,overdue:false};
      return{status:'ok',label:`还有${dl}天 · 还剩${nextPending.length}次`,dueDate:u.target,daysLeft:dl,overdue:false};
    }
    const u=pending[0];
    const dl=daysBetween(today,u.target);
    if(dl<0)return{status:'overdue',label:`逾期${-dl}天 · 还剩${pending.length}次`,dueDate:u.target,daysLeft:dl,overdue:true};
    if(dl===0)return{status:'today',label:`今天到期 · 还剩${pending.length}次`,dueDate:u.target,daysLeft:0,overdue:false};
    return{status:'ok',label:`还有${dl}天 · 还剩${pending.length}次`,dueDate:u.target,daysLeft:dl,overdue:false};
  }

  getMonthlyRangeStatus(task,today){
    const m=today.getMonth(),y=today.getFullYear();const parts=task.monthParts||[{label:'第1篇',before:15},{label:'第2篇',after:25}];
    if(!task.partCompletions)task.partCompletions={};

    // 检查指定月份是否全部完成
    const isFullyDone=(ym,yd)=>parts.every((_,i)=>!!task.partCompletions[`${ym}-${yd}-${i}`]);

    // Step 1: 当月是否已完成
    if(isFullyDone(y,m))return{status:'done',label:'本月已完成',dueDate:null,daysLeft:null,overdue:false};

    // Step 2: 上月是否完成（当任务在更早月份有数据时检查）
    let pm=m-1,py=y;if(pm<0){pm=11;py--}
    const hasOlderData=Object.keys(task.partCompletions).some(k=>{const p=k.split('-').map(Number);return p[0]<y||(p[0]===y&&p[1]<m)});
    if(hasOlderData&&!isFullyDone(py,pm)){
      // 上月未完成 → 显示上月的逾期状态
      let prevPP=[];
      parts.forEach((part,i)=>{
        const key=`${py}-${pm}-${i}`;
        if(!task.partCompletions[key]){
          let target=part.before?new Date(py,pm,part.before):new Date(py,pm+1,0);
          if(isSaturday(target))target=postponeToFriday(target);
          prevPP.push({label:part.label,target,daysLeft:daysBetween(today,target),overdue:daysBetween(today,target)<0});
        }
      });
      if(prevPP.length){
        prevPP.sort((a,b)=>a.daysLeft-b.daysLeft);const u=prevPP[0];
        return{status:'overdue',label:`上月${u.label}逾期${-u.daysLeft}天`,dueDate:u.target,daysLeft:u.daysLeft,overdue:true};
      }
    }

    // Step 3: 当月各part检查
    let pp=[];
    parts.forEach((part,i)=>{const key=`${y}-${m}-${i}`;if(!task.partCompletions[key]){
      let target=part.before?new Date(y,m,part.before):new Date(y,m+1,0);
      if(isSaturday(target))target=postponeToFriday(target);
      pp.push({label:part.label,target,daysLeft:daysBetween(today,target),overdue:daysBetween(today,target)<0})
    }});
    if(!pp.length)return{status:'done',label:'本月已完成',dueDate:null,daysLeft:null,overdue:false};
    pp.sort((a,b)=>a.daysLeft-b.daysLeft);const u=pp[0];
    if(u.overdue)return{status:'overdue',label:`${u.label}逾期${-u.daysLeft}天`,dueDate:u.target,daysLeft:u.daysLeft,overdue:true};
    if(u.daysLeft===0)return{status:'today',label:`${u.label} 今天到期`,dueDate:u.target,daysLeft:0,overdue:false};
    return{status:'ok',label:`${u.label} 还有${u.daysLeft}天`,dueDate:u.target,daysLeft:u.daysLeft,overdue:false};
  }

  getFlexibleStatus(task,today){
    const m=today.getMonth(),y=today.getFullYear();
    if(task.lastCompleted){const lc=new Date(task.lastCompleted);lc.setHours(0,0,0,0);if(lc.getFullYear()===y&&lc.getMonth()===m)return{status:'done',label:'本月已完成',dueDate:null,daysLeft:null,overdue:false}}
    const monthEnd=new Date(y,m,new Date(y,m+1,0).getDate());const dl=daysBetween(today,monthEnd);
    if(today.getDate()<task.remindFrom)return{status:'waiting',label:`${task.remindFrom}号起提醒`,dueDate:monthEnd,daysLeft:dl,overdue:false};
    if(dl<=0)return{status:'overdue',label:'本月未完成！',dueDate:monthEnd,daysLeft:dl,overdue:true};
    if(dl<=5)return{status:'soon',label:`月末还剩${dl}天`,dueDate:monthEnd,daysLeft:dl,overdue:false};
    return{status:'ok',label:`还有${dl}天`,dueDate:monthEnd,daysLeft:dl,overdue:false};
  }

  // ===== COMPLETE with custom date =====
  completeTask(taskId, customDate, fromCard){
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    const targetDate=customDate||TODAY();
    const now=new Date().toISOString();
    if(task.type==='monthly_multi'){
      if(!task.completions)task.completions={};
      if(task.lastNDays){
        const m=targetDate.getMonth(),y=targetDate.getFullYear();
        const monthEnd=new Date(y,m+1,0);
        const lastDay=monthEnd.getDate();
        const targets=[];
        let d=lastDay;
        while(targets.length<task.lastNDays&&d>=1){
          const dt=new Date(y,m,d);
          if(dt.getDay()!==6){
            targets.unshift({target:dt,key:dateKey(dt)});
          }
          d--;
        }
        let matched=false;
        const tdKey=dateKey(targetDate);
        for(const t of targets){
          if(t.key===tdKey&&!task.completions[t.key]){task.completions[t.key]=now;matched=true;break}
        }
        if(!matched){
          for(const t of targets){
            if(!task.completions[t.key]){task.completions[t.key]=now;break}
          }
        }
      }else{
        const m=targetDate.getMonth(),y=targetDate.getFullYear();
        let cycleMonth,cycleYear;
        const hasCycle=task.days&&task.days.some(d=>d>=25);
        if(hasCycle&&targetDate.getDate()>=25){cycleMonth=m;cycleYear=y}
        else if(hasCycle){cycleMonth=m===0?11:m-1;cycleYear=m===0?y-1:y}
        else{cycleMonth=m;cycleYear=y}
        const cycleTargets=monthlyMultiTargets(task,cycleYear,cycleMonth);
        let matched=false;
        const tdKey=dateKey(targetDate);
        for(const t of cycleTargets){
          if(t.key===tdKey&&!task.completions[t.key]){task.completions[t.key]=now;matched=true;break}
        }
        if(!matched){
          for(const t of cycleTargets){
            if(!task.completions[t.key]){task.completions[t.key]=now;break}
          }
        }
      }
    }else if(task.type==='旬'){
      if(!task.completions)task.completions={};
      const d=targetDate.getDate(),y=targetDate.getFullYear(),m=targetDate.getMonth();
      let xunIdx;if(d<=10)xunIdx=1;else if(d<=20)xunIdx=2;else xunIdx=3;
      const xunKey=`${y}-${m}-${xunIdx}`;
      // Convert old single-object format to array if needed
      if(task.completions[xunKey]&&!Array.isArray(task.completions[xunKey]))task.completions[xunKey]=[task.completions[xunKey]];
      if(!task.completions[xunKey])task.completions[xunKey]=[];
      const entry={ts:now,date:`${m+1}月${d}日`};
      if(task.completions[xunKey].length<2)task.completions[xunKey].push(entry);
      else task.completions[xunKey][1]=entry; // 3rd replaces 2nd
      task.lastCompleted=targetDate.toISOString(); // keep for linkTo ATM reset
    }else if(task.type==='monthly_range'){
      if(!task.partCompletions)task.partCompletions={};
      const mk=`${targetDate.getFullYear()}-${targetDate.getMonth()}`;
      const parts=task.monthParts||[];
      for(let i=0;i<parts.length;i++){const key=`${mk}-${i}`;if(!task.partCompletions[key]){task.partCompletions[key]=now;break}}
    }else{
      task.lastCompleted=targetDate.toISOString();
      if(!task.completionHistory)task.completionHistory=[];
      const dateStr=dateKey(targetDate);
      // Store as object with timestamp for export completeness
      const existing=task.completionHistory.find(h=>(typeof h==='string'?h:h.date)===dateStr);
      if(!existing)task.completionHistory.push({date:dateStr,ts:now});
    }
    if(task.linkTo){const linked=this.tasks.find(t=>t.id===task.linkTo);if(linked){linked.lastCompleted=targetDate.toISOString();if(!linked.completionHistory)linked.completionHistory=[];const ds=dateKey(targetDate);const ex=linked.completionHistory.find(h=>(typeof h==='string'?h:h.date)===ds);if(!ex)linked.completionHistory.push({date:ds,ts:now,linkedFrom:task.id});this.toast('✅ 已联动重置 ATM清机 计时')}}
    this.save();this.render();
    if(!fromCard)this.toast('✅ 任务已完成');else this.toast('✅ 已完成');
  }

  // ===== UNDO COMPLETE =====
  undoComplete(taskId){
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    let linkedDate=null;
    if(task.type==='monthly_multi'){
      // Undo the most recent completion
      if(task.completions){const keys=Object.keys(task.completions).sort((a,b)=>{const ta=task.completions[a],tb=task.completions[b];return String(ta).localeCompare(String(tb))});if(keys.length){delete task.completions[keys[keys.length-1]]}}
    }else if(task.type==='旬'){
      if(task.completions){const keys=Object.keys(task.completions).filter(k=>k.startsWith(`${TODAY().getFullYear()}-${TODAY().getMonth()}`)).sort();if(keys.length){const lastKey=keys[keys.length-1];const entries=task.completions[lastKey];if(Array.isArray(entries)&&entries.length>0){const removed=entries[entries.length-1];linkedDate=xunEntryDateKey(lastKey,removed);entries.pop();if(!entries.length)delete task.completions[lastKey]}else{linkedDate=xunEntryDateKey(lastKey,entries);delete task.completions[lastKey]}}}
      // Also clear lastCompleted if no more completions this month
      const monthKeys=Object.keys(task.completions||{}).filter(k=>k.startsWith(`${TODAY().getFullYear()}-${TODAY().getMonth()}`));
      if(!monthKeys.length)task.lastCompleted=null;
    }else if(task.type==='monthly_range'){
      if(task.partCompletions){const keys=Object.keys(task.partCompletions).sort();if(keys.length){delete task.partCompletions[keys[keys.length-1]]}}
    }else{
      if(task.completionHistory&&task.completionHistory.length){const removed=task.completionHistory.pop();linkedDate=chDate(removed)}
      task.lastCompleted=null;
    }
    // Reverse only the linked record for the same completion date.
    if(task.linkTo&&linkedDate){const linked=this.tasks.find(t=>t.id===task.linkTo);if(linked){if(linked.completionHistory)linked.completionHistory=linked.completionHistory.filter(h=>chDate(h)!==linkedDate);linked.lastCompleted=latestHistoryIso(linked);this.toast('↩️ 已联动撤销 ATM清机 重置')}}
    this.save();this.render();this.openDetail(taskId);this.toast('↩️ 已撤销完成');
  }

  manualReset(taskId){
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    const now=new Date().toISOString();task.lastCompleted=now;
    if(!task.manualResetDates)task.manualResetDates=[];task.manualResetDates.push(now);
    this.save();this.render();this.openDetail(taskId);this.toast('✅ 已重置计时');
  }



  // ===== RENDER =====
  render(){this.renderDashboard();this.renderTasks()}

  isMonthFullyComplete(task){
    const today=TODAY();const m=today.getMonth(),y=today.getFullYear();
    if(task.type==='旬'){
      if(!task.completions)return false;
      const xunDone=k=>{const d=task.completions[k];return d&&(Array.isArray(d)?d.length>0:true)};
      return!!(xunDone(`${y}-${m}-1`)&&xunDone(`${y}-${m}-2`)&&xunDone(`${y}-${m}-3`));
    }
    if(task.type==='monthly_range'){
      if(!task.partCompletions||!task.monthParts)return false;
      const mk=`${y}-${m}`;
      return task.monthParts.every((_,i)=>!!task.partCompletions[`${mk}-${i}`]);
    }
    if(task.type==='monthly_multi'){
      if(!task.completions)return false;
      if(task.lastNDays){
        const monthEnd=new Date(y,m+1,0);
        const lastDay=monthEnd.getDate();
        let count=0,d=lastDay;
        while(count<task.lastNDays&&d>=1){
          const dt=new Date(y,m,d);
          if(dt.getDay()!==6){
            const key=`${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
            if(!task.completions[key])return false;
            count++;
          }
          d--;
        }
        return true;
      }
      if(!task.days)return false;
      return monthlyMultiTargets(task,y,m).every(t=>!!task.completions[t.key]);
    }
    if(task.type==='weekly'&&task.multiCompletion){
      if(!task.completionHistory)return false;
      const cnt=task.completionHistory.filter(h=>{const p=chDate(h).split('-');return parseInt(p[0])===y&&parseInt(p[1])===m}).length;
      return cnt>=(task.monthlyTarget||4);
    }
    return false;
  }

  renderDashboard(){
    const active=this.tasks;
    const overdue=[],upcoming=[],done=[];
    active.forEach(task=>{const s=this.getTaskStatus(task);task._status=s;
      if(s.status==='overdue')overdue.push(task);
      else if(s.status==='today')overdue.push(task); // 今天到期也算待处理
      else if(s.status==='done'&&(!task.multiCompletion||this.isMonthFullyComplete(task)))done.push(task);
       else if(s.status==='done'&&task.multiCompletion&&!this.isMonthFullyComplete(task)){if(task.type==='旬')upcoming.push(task);else overdue.push(task)}
      else if(s.status==='pending')overdue.push(task);
      else if(s.status==='missed')overdue.push(task);
      else if(s.status==='soon'||(s.daysLeft!==null&&s.daysLeft<=3))upcoming.push(task);
      else if(s.status==='ok')upcoming.push(task);
    });
    // 待处理：逾期在前，再按剩余时间短→长
    overdue.sort((a,b)=>{
      if(a._status.overdue!==b._status.overdue)return a._status.overdue?-1:1;
      return(a._status.daysLeft||999)-(b._status.daysLeft||999)
    });
    // 进行中：按剩余时间短→长
    upcoming.sort((a,b)=>{if(a._status.daysLeft===null)return 1;if(b._status.daysLeft===null)return -1;return a._status.daysLeft-b._status.daysLeft});
    const upcomingActive=upcoming.filter(t=>t._status.status!=='done'||(t.multiCompletion&&!this.isMonthFullyComplete(t)));
    const doneTasks=[...upcoming.filter(t=>t._status.status==='done'&&(!t.multiCompletion||this.isMonthFullyComplete(t))),...done];

    document.getElementById('tabBar').innerHTML=`
      <div class="tab-item ${this.activeTab==='overdue'?'active':''}" data-tab="overdue" onclick="app.switchTab('overdue')"><span class="tab-num">${overdue.length}</span><span class="tab-label">待处理</span></div>
      <div class="tab-item ${this.activeTab==='upcoming'?'active':''}" data-tab="upcoming" onclick="app.switchTab('upcoming')"><span class="tab-num">${upcomingActive.length}</span><span class="tab-label">进行中</span></div>
      <div class="tab-item ${this.activeTab==='done'?'active':''}" data-tab="done" onclick="app.switchTab('done')"><span class="tab-num">${doneTasks.length}</span><span class="tab-label">已完成</span></div>`;

    let panels='';
    panels+=`<div class="tab-panel ${this.activeTab==='overdue'?'active':''}" data-panel="overdue">`;
    panels+=overdue.length?overdue.map(t=>this.renderCard(t)).join(''):'<div class="empty"><div class="empty-icon">🎉</div><div class="empty-text">没有逾期任务</div></div>';
    panels+=`</div>`;
    panels+=`<div class="tab-panel ${this.activeTab==='upcoming'?'active':''}" data-panel="upcoming">`;
    panels+=upcomingActive.length?upcomingActive.map(t=>this.renderCard(t)).join(''):'<div class="empty"><div class="empty-icon">✨</div><div class="empty-text">暂无进行中任务</div></div>';
    panels+=`</div>`;
    panels+=`<div class="tab-panel ${this.activeTab==='done'?'active':''}" data-panel="done">`;
    panels+=doneTasks.length?doneTasks.map(t=>this.renderCard(t,true)).join(''):'<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">暂无已完成任务</div></div>';
    panels+=`</div>`;
    
    document.getElementById('tabContent').innerHTML=panels;
  }

  switchTab(tab){
    this.activeTab=tab;
    document.querySelectorAll('.tab-item').forEach(el=>{el.classList.toggle('active',el.dataset.tab===tab)});
    document.querySelectorAll('.tab-panel').forEach(el=>{
      const is=el.dataset.panel===tab;
      if(is&&!el.classList.contains('active')){el.classList.add('active');el.style.animation='none';el.offsetHeight;el.style.animation=''}
      else if(!is)el.classList.remove('active');
    });
  }

  renderCard(task,isDone=false){
    const s=task._status||this.getTaskStatus(task);
    const sevClass=`severity-${task.severity}`;const overdue=s.overdue;
    const doneClass=isDone&&s.status==='done'?'done-card':'';
    let cc='ok-text';if(s.overdue)cc='overdue-text';else if(s.daysLeft!==null&&s.daysLeft<=3)cc='soon-text';
    // 倒计时格式化:逾期N天/今天到期/剩余N天
    let cdText='';
    if(s.overdue&&s.daysLeft===null)cdText=s.label||'';
    else if(s.overdue&&s.daysLeft!==null)cdText='逾期'+(-s.daysLeft)+'天';
    else if(s.daysLeft!==null&&s.daysLeft===0)cdText='今天到期';
    else if(s.daysLeft!==null&&s.daysLeft>0)cdText='剩余'+s.daysLeft+'天';
    else cdText=s.label||'';
    // 进度格子+进度文字
    let dots='',progText='';
    const now=new Date();const yy=now.getFullYear(),mm=now.getMonth();
    if(task.type==='旬'){
      const dc=[1,2,3].filter(i=>{const k=`${yy}-${mm}-${i}`;const v=task.completions?.[k];return v&&(Array.isArray(v)?v.length>0:true)}).length;
      for(let i=0;i<3;i++)dots+='<span class="prog-dot '+(i<dc?'prog-on':'prog-off')+'"></span>';progText=dc+'/3'
    }else if(task.type==='monthly_multi'&&task.days&&task.days.length){
      const dc=monthlyMultiTargets(task,yy,mm).filter(t=>task.completions?.[t.key]).length;
      for(let i=0;i<task.days.length;i++)dots+='<span class="prog-dot '+(i<dc?'prog-on':'prog-off')+'"></span>';progText=dc+'/'+task.days.length
    }else if(task.multiCompletion&&(task.type==='weekly'||task.monthlyTarget)){
      const mxt=task.monthlyTarget||4;const dc=task.completionHistory?task.completionHistory.filter(h=>{const p=chDate(h).split('-');return parseInt(p[0])===yy&&parseInt(p[1])===mm}).length:0;
      for(let i=0;i<mxt;i++)dots+='<span class="prog-dot '+(i<dc?'prog-on':'prog-off')+'"></span>';progText=dc+'/'+mxt
    }
    // 组合进度文字+倒计时
    const fullText=progText?(progText+(cdText?' · '+cdText:'')):cdText;
    return`<div class="task-card ${sevClass} ${overdue?'overdue':''} ${doneClass}">
      <div class="card-body" onclick="app.openDetail('${task.id}')">
        <div class="card-top"><div class="card-name">${task.name}</div></div>
        <div class="card-row">${dots?`<div class="prog-bar">${dots}</div>`:'<div></div>'}<div class="card-countdown ${cc}">${fullText||s.label}</div></div>
      </div>
      <div class="card-cal-btn" onclick="event.stopPropagation();app.openCalPicker('${task.id}')">📅</div>
      <div class="card-done-btn" onclick="event.stopPropagation();app.quickDone('${task.id}')">✓</div>
    </div>`;
  }

  quickDone(taskId){
    // Direct complete today (no calendar)
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    const s=this.getTaskStatus(task);
    if(s.status==='done'&&task.type!=='旬'){this.openDetail(taskId);return}
    this.completeTask(taskId, TODAY());if(document.getElementById('detailModal').classList.contains('show'))this.refreshDetail(taskId);
  }

  openCalPicker(taskId){
    // Open calendar overlay with 0.6s glass animation
    const today=TODAY();
    this._calYear=today.getFullYear();this._calMonth=today.getMonth();
    this._calSelected=today;this._calTaskId=taskId;
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    let html=`<div class="modal-title" style="padding-right:0">${task.name}</div>
      <div class="modal-type">${task.typeLabel||task.type} · 选择完成日期</div>
      <div id="calPickerWidget"></div>`;
    document.getElementById('calOverlayContent').innerHTML=html;
    document.getElementById('calOverlay').classList.add('show');
    this.renderCalPicker();
  }

  renderCalPicker(){
    const el=document.getElementById('calPickerWidget');if(!el)return;
    const y=this._calYear,m=this._calMonth,today=TODAY();
    const firstDay=new Date(y,m,1);const startDay=(firstDay.getDay()+6)%7;
    const daysInMonth=new Date(y,m+1,0).getDate();const daysInPrev=new Date(y,m,0).getDate();
    const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const weekdays=['一','二','三','四','五','六','日'];
    let html=`<div class="calendar-container">
      <div class="calendar-nav"><button class="calendar-nav-btn" onclick="app.calPickerNav(-1)">‹</button><span class="calendar-month-label">${y}年${monthNames[m]}</span><button class="calendar-nav-btn" onclick="app.calPickerNav(1)">›</button></div>
      <div class="calendar-weekdays">${weekdays.map(w=>`<span>${w}</span>`).join('')}</div><div class="calendar-days">`;
    for(let i=startDay-1;i>=0;i--){const d=daysInPrev-i;const date=new Date(y,m-1,d);const sel=this._calSelected&&this.isSameDay(date,this._calSelected);html+=`<div class="calendar-day other-month ${sel?'selected':''}" onclick="app.calPickerSelect(${y},${m-1},${d})">${d}</div>`}
    for(let d=1;d<=daysInMonth;d++){const date=new Date(y,m,d);const isToday=this.isSameDay(date,today);const sel=this._calSelected&&this.isSameDay(date,this._calSelected);const isFuture=date>today;const cls=['calendar-day'];if(isToday)cls.push('today');if(sel)cls.push('selected');if(isFuture)cls.push('future');html+=`<div class="${cls.join(' ')}" onclick="app.calPickerSelect(${y},${m},${d})">${d}</div>`}
    const total=startDay+daysInMonth;const rem=total%7===0?0:7-total%7;for(let d=1;d<=rem;d++){const date=new Date(y,m+1,d);const sel=this._calSelected&&this.isSameDay(date,this._calSelected);html+=`<div class="calendar-day other-month ${sel?'selected':''}" onclick="app.calPickerSelect(${y},${m+1},${d})">${d}</div>`}
    html+=`</div>`;
    const selStr=this._calSelected?`${this._calSelected.getFullYear()}年${this._calSelected.getMonth()+1}月${this._calSelected.getDate()}日`:'选择日期';
    html+=`<button class="calendar-confirm-btn" onclick="app.calPickerConfirm()" ${!this._calSelected?'disabled':''}>✓ 标记 ${selStr} 完成</button></div>`;
    el.innerHTML=html;
  }

  calPickerNav(dir){this._calMonth+=dir;if(this._calMonth>11){this._calMonth=0;this._calYear++}if(this._calMonth<0){this._calMonth=11;this._calYear--}this.renderCalPicker()}
  calPickerSelect(y,m,d){this._calSelected=new Date(y,m,d);this._calSelected.setHours(0,0,0,0);this.renderCalPicker()}
  calPickerConfirm(){if(!this._calSelected||!this._calTaskId)return;this.completeTask(this._calTaskId,this._calSelected);this.closeCalOverlay()}
  closeCalOverlay(){document.getElementById('calOverlay').classList.remove('show')}

  // ===== CALENDAR PICKER (from detail modal) =====
  openCalendarForComplete(taskId){
    const today=TODAY();
    this._calYear=today.getFullYear();this._calMonth=today.getMonth();
    this._calSelected=today;this._calTaskId=taskId;

    // Open in cal-overlay with 0.6s glass animation
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    let html=`<div class="modal-title" style="padding-right:0">${task.name}</div>
      <div class="modal-type">${task.typeLabel||task.type} · 选择完成日期</div>
      <div id="calendarWidget"></div>`;
    document.getElementById('calOverlayContent').innerHTML=html;
    document.getElementById('calOverlay').classList.add('show');
    this.renderCalendar();
  }

  renderCalendar(){
    const el=document.getElementById('calendarWidget');if(!el)return;
    const y=this._calYear,m=this._calMonth;
    const today=TODAY();
    const firstDay=new Date(y,m,1);
    const startDay=(firstDay.getDay()+6)%7; // Mon=0
    const daysInMonth=new Date(y,m+1,0).getDate();
    const daysInPrev=new Date(y,m,0).getDate();
    const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const weekdays=['一','二','三','四','五','六','日'];

    let html=`<div class="calendar-container">
      <div class="calendar-nav">
        <button class="calendar-nav-btn" onclick="app.calNav(-1)">‹</button>
        <span class="calendar-month-label">${y}年${monthNames[m]}</span>
        <button class="calendar-nav-btn" onclick="app.calNav(1)">›</button>
      </div>
      <div class="calendar-weekdays">${weekdays.map(w=>`<span>${w}</span>`).join('')}</div>
      <div class="calendar-days">`;

    // Prev month padding
    for(let i=startDay-1;i>=0;i--){
      const d=daysInPrev-i;const date=new Date(y,m-1,d);
      const sel=this._calSelected&&this.isSameDay(date,this._calSelected);
      html+=`<div class="calendar-day other-month ${sel?'selected':''}" onclick="app.calSelect(${y},${m-1},${d})">${d}</div>`;
    }

    // Current month
    for(let d=1;d<=daysInMonth;d++){
      const date=new Date(y,m,d);
      const isToday=this.isSameDay(date,today);
      const sel=this._calSelected&&this.isSameDay(date,this._calSelected);
      const isFuture=date>today;
      const classes=['calendar-day'];
      if(isToday)classes.push('today');
      if(sel)classes.push('selected');
      if(isFuture)classes.push('future');
      html+=`<div class="${classes.join(' ')}" onclick="app.calSelect(${y},${m},${d})">${d}</div>`;
    }

    // Next month padding
    const totalCells=startDay+daysInMonth;
    const remaining=totalCells%7===0?0:7-totalCells%7;
    for(let d=1;d<=remaining;d++){
      const date=new Date(y,m+1,d);
      const sel=this._calSelected&&this.isSameDay(date,this._calSelected);
      html+=`<div class="calendar-day other-month ${sel?'selected':''}" onclick="app.calSelect(${y},${m+1},${d})">${d}</div>`;
    }

    html+=`</div>`;
    // Confirm button
    const selStr=this._calSelected?`${this._calSelected.getFullYear()}年${this._calSelected.getMonth()+1}月${this._calSelected.getDate()}日`:'选择日期';
    html+=`<button class="calendar-confirm-btn" onclick="app.calConfirm()" ${!this._calSelected?'disabled':''}>✓ 标记 ${selStr} 完成</button>`;
    html+=`</div>`;
    el.innerHTML=html;
  }

  isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}

  calNav(dir){
    this._calMonth+=dir;
    if(this._calMonth>11){this._calMonth=0;this._calYear++}
    if(this._calMonth<0){this._calMonth=11;this._calYear--}
    this.renderCalendar();
  }

  calSelect(y,m,d){
    this._calSelected=new Date(y,m,d);this._calSelected.setHours(0,0,0,0);
    this.renderCalendar();
  }

  calConfirm(){
    if(!this._calSelected||!this._calTaskId)return;
    this.completeTask(this._calTaskId,this._calSelected);
    this.closeCalOverlay();
    this.refreshDetail(this._calTaskId);
  }

  // ===== TASKS PAGE =====
  renderTasks(){
    const groups={rolling:{label:'🔄 滚动任务',tasks:[]},monthly:{label:'📅 月度任务',tasks:[]},weekly:{label:'📆 每周任务',tasks:[]}};
    this.tasks.forEach(t=>{if(t.type==='rolling')groups.rolling.tasks.push(t);else if(t.type==='weekly')groups.weekly.tasks.push(t);else groups.monthly.tasks.push(t)});
    let html='';
    Object.entries(groups).forEach(([key,group])=>{
      if(!group.tasks.length)return;
      html+=`<div class="section"><div class="section-header" onclick="this.classList.toggle('collapsed')"><span class="title">${group.label}</span><span class="count">${group.tasks.length}</span><span class="arrow">▼</span></div><div class="section-body" style="max-height:${group.tasks.length*120}px">${group.tasks.map(t=>{t._status=this.getTaskStatus(t);return this.renderCard(t)}).join('')}</div></div>`;
    });
    document.getElementById('tasksContent').innerHTML=html;
  }

  // ===== DETAIL MODAL =====
  openDetail(taskId){
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    const now=new Date();this._miniCalMonth=now.getMonth();this._miniCalYear=now.getFullYear();
    const s=this.getTaskStatus(task);
    let html=`<div class="modal-title">${task.name}</div><div class="modal-type">${task.typeLabel||task.type}</div>`;
    // Status section removed - mini calendar shows completion history instead
    if(task.desc)html+=`<div class="modal-section"><div class="modal-section-title">说明</div><div class="modal-note">${task.desc}</div></div>`;
    if(task.hasPersistentNote&&task.note)html+=`<div class="modal-section"><div class="modal-section-title">📋 操作备注（常驻）</div><div class="modal-note">${task.note}</div></div>`;

    if(task.type==='monthly_multi'){
      const today=new Date(),m=today.getMonth(),y=today.getFullYear();
      if(task.lastNDays){
        const monthEnd=new Date(y,m+1,0);const lastDay=monthEnd.getDate();
        html+=`<div class="modal-section"><div class="modal-section-title">各节点状态（跳过周六）</div>`;
        let cnt=0,d=lastDay;
        while(cnt<task.lastNDays&&d>=1){
          const dt=new Date(y,m,d);
          if(dt.getDay()!==6){
            const key=dateKey(dt);const done=task.completions&&task.completions[key];
            html+=`<div class="modal-info-row"><span class="label">${fmtDate(dt)}</span><span class="value" style="color:${done?'var(--green)':'var(--red)'}">${done?'✅ 已完成':'🔴 待完成'}</span></div>`;
            cnt++;
          }
          d--;
        }
        html+=`</div>`;
      }else{
        const hasCycle=task.days&&task.days.some(d=>d>=25);let cycleMonth,cycleYear;
        if(hasCycle&&today.getDate()>=25){cycleMonth=m;cycleYear=y}
        else if(hasCycle){cycleMonth=m===0?11:m-1;cycleYear=m===0?y-1:y}
        else{cycleMonth=m;cycleYear=y}
        html+=`<div class="modal-section"><div class="modal-section-title">各节点状态</div>`;
        monthlyMultiTargets(task,cycleYear,cycleMonth).forEach(target=>{
          const done=task.completions&&task.completions[target.key];
          html+=`<div class="modal-info-row"><span class="label">${fmtDate(target.target)}</span><span class="value" style="color:${done?'var(--green)':'var(--red)'}">${done?'✅ 已完成':'🔴 待完成'}</span></div>`;
        });
        html+=`</div>`;
      }
    }
    if(task.type==='旬'){const m=new Date().getMonth(),y=new Date().getFullYear();if(!task.completions)task.completions={};html+=`<div class="modal-section"><div class="modal-section-title">本月各旬状态</div>`;const xunLabels=['第1旬（1-10号）','第2旬（11-20号）','第3旬（21-月末）'];xunLabels.forEach((label,i)=>{const key=`${y}-${m}-${i+1}`;const raw=task.completions[key];const arr=Array.isArray(raw)?raw:raw?[raw]:[];const display=arr.length?arr.map(r=>r.date||'已完成').join(' + '):null;html+=`<div class="modal-info-row"><span class="label">${label}</span><span class="value" style="color:${arr.length?'var(--green)':'var(--text3)'}">${arr.length?'✅ '+display:'⬜ 待完成'}</span></div>`});html+=`</div>`}
    if(task.type==='weekly'&&task.multiCompletion&&task.weekStart!==undefined){
      const m=new Date().getMonth(),y=new Date().getFullYear();
      const mxt=task.monthlyTarget||4;
      const firstDay=new Date(y,m,1),lastDay=new Date(y,m+1,0);
      const weeks=[];
      // Week 1: from 1st of month to following Sunday
      let s=new Date(firstDay),e=new Date(firstDay);
      const dw=e.getDay();e.setDate(e.getDate()+(dw===0?0:7-dw));
      if(e>lastDay)e=new Date(lastDay);
      weeks.push({start:s,end:e});
      // Subsequent weeks: Mon-Sun
      while(true){
        s=new Date(e);s.setDate(s.getDate()+1);
        if(s>lastDay)break;
        e=new Date(s);const sw=e.getDay();
        e.setDate(e.getDate()+(sw===0?0:7-sw));
        if(e>lastDay)e=new Date(lastDay);
        weeks.push({start:s,end:e});
      }
      const cnt=task.completionHistory?task.completionHistory.filter(h=>{const p=chDate(h).split('-');return parseInt(p[0])===y&&parseInt(p[1])===m}).length:0;
      html+=`<div class="modal-section"><div class="modal-section-title">本月各周状态（${cnt}/${mxt}）</div>`;
      weeks.forEach((w,i)=>{
        const done=task.completionHistory&&task.completionHistory.some(h=>{const p=chDate(h).split('-');if(p.length<3)return false;const d=new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]));return d>=w.start&&d<=w.end});
        const label=w.start.getMonth()+1+'/'+w.start.getDate()+'-'+w.end.getDate()+'号';
        html+=`<div class="modal-info-row"><span class="label">第${i+1}周（${label}）</span><span class="value" style="color:${done?'var(--green)':'var(--text3)'}">${done?'✅ 已完成':'⬜ 待完成'}</span></div>`;
      });
      html+=`</div>`;
    }else if(task.type==='weekly'&&task.multiCompletion){
    const m=new Date().getMonth(),y=new Date().getFullYear();
      const mxt=task.monthlyTarget||4;
      // Find all Sundays in the current month
      const sundays=[];
      const firstDay=new Date(y,m,1);
      let d=firstDay;
      // Find first Sunday
      while(d.getDay()!==0){d.setDate(d.getDate()+1)}
      while(d.getMonth()===m){sundays.push(new Date(d));d.setDate(d.getDate()+7)}
      // Limit to monthlyTarget
      const targets=sundays.slice(0,mxt);
      html+=`<div class="modal-section"><div class="modal-section-title">本月各周状态（${task.completionHistory?task.completionHistory.filter(h=>{const p=chDate(h).split('-');return parseInt(p[0])===y&&parseInt(p[1])===m}).length:0}/${mxt}）</div>`;
      targets.forEach((target,i)=>{
        const dateStr=`${target.getFullYear()}-${target.getMonth()}-${target.getDate()}`;
        const done=task.completionHistory&&task.completionHistory.some(h=>chDate(h)===dateStr);
        html+=`<div class="modal-info-row"><span class="label">第${i+1}周（周日${target.getMonth()+1}/${target.getDate()}）</span><span class="value" style="color:${done?'var(--green)':'var(--text3)'}">${done?'✅ '+`${target.getMonth()+1}月${target.getDate()}日`:'⬜ 待完成'}</span></div>`;
      });
      html+=`</div>`;
    }

    // Mini completion calendar (read-only)
    html+=this.renderMiniCalendar(task);

    // Action buttons
    html+=`<div class="modal-section">`;
    if(task.type==='weekly'&&task.multiCompletion){
      html+=`<button class="modal-btn btn-complete" onclick="app.openCalendarForComplete('${task.id}')">✅ 完成本周检查</button>`;
    }else if(task.type==='monthly_multi'){
      html+=`<button class="modal-btn btn-complete" onclick="app.openCalendarForComplete('${task.id}')">✅ 完成一个节点</button>`;
    }else if(task.type==='monthly_range'){
      html+=`<button class="modal-btn btn-complete" onclick="app.openCalendarForComplete('${task.id}')">✅ 完成一篇</button>`;
    }else if(task.type==='旬'){
      html+=`<button class="modal-btn btn-complete" onclick="app.openCalendarForComplete('${task.id}')">✅ 完成本旬</button>`;
    }else{
      html+=`<button class="modal-btn btn-complete" onclick="app.openCalendarForComplete('${task.id}')">✅ 标记完成</button>`;
    }
    if(!DEFAULT_TASKS.find(d=>d.id===task.id))html+=`<button class="modal-btn btn-delete" onclick="app.deleteTask('${task.id}')">🗑️ 删除任务</button>`;
    html+=`<button class="modal-btn btn-close" onclick="app.closeDetail()">关闭</button></div>`;



    // Undo button (rarely used, at the very bottom)
    html+=`<div class="modal-section"><button class="modal-btn btn-undo" style="opacity:.6;font-size:13px" onclick="app.undoComplete('${task.id}')">↩️ 撤销完成</button></div>`;

    document.getElementById('detailContent').innerHTML=html;
    document.getElementById('detailModal').classList.add('show');
  }

  closeDetail(){document.getElementById('detailModal').classList.remove('show')}

  refreshDetail(taskId){
    const content=document.getElementById('detailContent');
    content.style.transition='opacity .25s ease';
    content.style.opacity='0';
    setTimeout(()=>{
      this.openDetail(taskId);
      content.style.opacity='0';
      requestAnimationFrame(()=>{content.style.transition='opacity .35s ease';content.style.opacity='1'});
    },260);
  }

  renderMiniCalendar(task,slideDir){
    // Collect ALL completion dates for this task (across all months)
    const doneDates=new Set();
    if(task.lastCompleted&&task.type!=='旬'){const d=new Date(task.lastCompleted);d.setHours(0,0,0,0);doneDates.add(d.toDateString())}
    if(task.completionHistory){task.completionHistory.forEach(h=>{const parts=chDate(h).split('-');if(parts.length===3){const d=new Date(parseInt(parts[0]),parseInt(parts[1]),parseInt(parts[2]));doneDates.add(d.toDateString())}})}
    if(task.completions){
      if(task.type==='旬'){
        Object.keys(task.completions).forEach(k=>{
          const entries=Array.isArray(task.completions[k])?task.completions[k]:task.completions[k]?[task.completions[k]]:[];
          entries.forEach(rec=>{
            if(rec&&rec.date){
              const match=rec.date.match(/(\d+)月(\d+)日/);
              if(match){const d=new Date(parseInt(k.split('-')[0]),parseInt(match[1])-1,parseInt(match[2]));doneDates.add(d.toDateString())}
            }
          });
        });
      } else {
        Object.keys(task.completions).forEach(k=>{const p=k.split('-');if(p.length===3){const d=new Date(parseInt(p[0]),parseInt(p[1]),parseInt(p[2]));doneDates.add(d.toDateString())}})
      }
    }
    if(task.partCompletions){Object.keys(task.partCompletions).forEach(k=>{const [y,m]=k.split('-').map(Number);const d=new Date(y,m,15);doneDates.add(d.toDateString())})}
    if(task.manualResetDates){task.manualResetDates.forEach(d=>{const dt=new Date(d);dt.setHours(0,0,0,0);doneDates.add(dt.toDateString())})}

    const today=TODAY();const y=this._miniCalYear;const m=this._miniCalMonth;
    const firstDay=new Date(y,m,1);const startDay=(firstDay.getDay()+6)%7;
    const daysInMonth=new Date(y,m+1,0).getDate();const daysInPrev=new Date(y,m,0).getDate();
    const monthNames=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    const weekdays=['一','二','三','四','五','六','日'];
    const todayMonth=today.getMonth();const todayYear=today.getFullYear();
    const canGoNext=!(y===todayYear&&m===todayMonth);
    const canGoPrev=y>2020;
    const slideClass=slideDir?(slideDir>0?'slide-left':'slide-right'):'';

    let cal=`<div class="mini-cal">
      <div class="mini-cal-header">
        <button class="mini-cal-nav" ${canGoPrev?'':'disabled'} onclick="app.miniCalNav(-1,'${task.id}')">◀</button>
        <span class="mini-cal-title">${y}年${monthNames[m]}</span>
        <button class="mini-cal-nav" ${canGoNext?'':'disabled'} onclick="app.miniCalNav(1,'${task.id}')">▶</button>
      </div>
      <div class="mini-cal-grid ${slideClass}">
        <div class="mini-cal-weekdays">${weekdays.map(w=>`<span>${w}</span>`).join('')}</div>
        <div class="mini-cal-days">`;
    for(let i=startDay-1;i>=0;i--){cal+=`<div class="mini-cal-day other">${daysInPrev-i}</div>`}
    for(let d=1;d<=daysInMonth;d++){
      const date=new Date(y,m,d);const isToday=this.isSameDay(date,today);
      const isDone=doneDates.has(date.toDateString());
      const cls=['mini-cal-day'];
      if(isToday)cls.push('today');if(isDone)cls.push('done');
      cal+=`<div class="${cls.join(' ')}">${d}</div>`;
    }
    const total=startDay+daysInMonth;const rem=total%7===0?0:7-total%7;
    for(let d=1;d<=rem;d++){cal+=`<div class="mini-cal-day other">${d}</div>`}
    cal+=`</div></div></div>`;
    return `<div class="modal-section" id="miniCalSection"><div class="modal-section-title">📅 完成记录</div>${cal}</div>`;
  }

  miniCalNav(dir,taskId){
    this._miniCalMonth+=dir;
    if(this._miniCalMonth>11){this._miniCalMonth=0;this._miniCalYear++}
    if(this._miniCalMonth<0){this._miniCalMonth=11;this._miniCalYear--}
    const sec=document.getElementById('miniCalSection');
    if(!sec)return;
    const task=this.tasks.find(t=>t.id===taskId);if(!task)return;
    const tmpDiv=document.createElement('div');
    tmpDiv.innerHTML=this.renderMiniCalendar(task,dir);
    const newCal=tmpDiv.firstElementChild;
    sec.replaceWith(newCal);
  }

  deleteTask(taskId){this.showConfirm('删除任务','确定要删除这个任务吗？此操作不可恢复。',()=>{this.tasks=this.tasks.filter(t=>t.id!==taskId);this.save();this.closeDetail();this.render();this.toast('🗑️ 任务已删除')})}

  exportData(){
    // Generate readable completion summary for each task
    const summary=this.tasks.map(t=>{
      const records=[];
      // monthly_range: partCompletions
      if(t.partCompletions){Object.keys(t.partCompletions).sort().forEach(k=>{const v=t.partCompletions[k];const ts=typeof v==='string'?v:v;const p=k.split('-');const partLabel=(t.monthParts&&t.monthParts[parseInt(p[2])])?t.monthParts[parseInt(p[2])].label:`Part${p[2]}`;records.push({date:`${p[0]}/${parseInt(p[1])+1}`,part:partLabel,time:ts})})}
      // 旬: completions
      if(t.completions&&t.type==='旬'){Object.keys(t.completions).sort().forEach(k=>{const entries=Array.isArray(t.completions[k])?t.completions[k]:[t.completions[k]];entries.forEach(e=>{if(e&&e.ts)records.push({date:e.date||k,time:e.ts})})})}
      // monthly_multi: completions
      if(t.completions&&t.type==='monthly_multi'){Object.keys(t.completions).sort().forEach(k=>{records.push({date:k,time:t.completions[k]})})}
      // rolling/weekly/safety_check: completionHistory
      if(t.completionHistory){t.completionHistory.forEach(h=>{const ds=chDate(h);const ts=typeof h==='string'?null:h.ts;const p=ds.split('-');records.push({date:`${p[0]}/${parseInt(p[1])+1}/${parseInt(p[2])}`,time:ts||'仅日期'})})}
      return{名称:t.name,类型:t.type,完成记录:records.length?records:'无记录'};
    });
    const data=JSON.stringify({tasks:this.tasks,summary,exportedAt:new Date().toISOString()},null,2);
    const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`运营RUSH_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);this.toast('📤 数据已导出')
  }

  importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(e)=>{try{const data=JSON.parse(e.target.result);if(data.tasks&&Array.isArray(data.tasks)){this.showConfirm('导入数据','导入将覆盖当前所有数据，确定继续？',()=>{this.tasks=data.tasks;this.tasks.forEach(t=>{const def=DEFAULT_TASKS.find(d=>d.id===t.id);if(def){t.name=def.name;t.type=def.type;t.severity=def.severity;t.intervalDays=def.intervalDays;t.typeLabel=def.typeLabel;t.desc=def.desc;if(def.day!==undefined)t.day=def.day;if(def.weekday!==undefined)t.weekday=def.weekday;if(def.postponeSat!==undefined)t.postponeSat=def.postponeSat;if(def.linkTo!==undefined)t.linkTo=def.linkTo;if(def.linkedFrom!==undefined)t.linkedFrom=def.linkedFrom;if(def.monthParts)t.monthParts=JSON.parse(JSON.stringify(def.monthParts));if(def.multiCompletion!==undefined)t.multiCompletion=def.multiCompletion}});this.save();this.render();this.toast('📥 数据已导入')})}else this.toast('⚠️ 无效的数据文件')}catch(err){this.toast('⚠️ 文件解析失败')}};reader.readAsText(file);event.target.value=''}

  confirmReset(){this.showConfirm('重置所有数据','将清除所有任务数据和记录，不可恢复！',()=>{localStorage.removeItem('opsrush_data');this.tasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));this.save();this.render();this.toast('🗑️ 数据已重置')})}
  checkUpdate(){
    this.toast('⏳ 正在检查更新...');
    fetch('https://raw.githubusercontent.com/qq365098020/ops-rush/main/manifest.json?_='+Date.now(),{cache:'no-store'})
      .then(r=>r.json())
      .then(d=>{
        if(!d.version)return;
        var cv=localStorage.getItem('_app_version');
        if(d.version===cv){this.toast('✅ 已是最新版本');return}
        localStorage.setItem('_app_version',d.version);
        location.reload();
      })
      .catch(()=>{this.toast('⚠️ 检查失败，请检查网络')});
  }

  toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(this._toastTimer);this._toastTimer=setTimeout(()=>el.classList.remove('show'),2200)}

  showConfirm(title,msg,onOk){document.getElementById('confirmTitle').textContent=title;document.getElementById('confirmMsg').textContent=msg;document.getElementById('confirmDialog').classList.add('show');document.getElementById('confirmOk').onclick=()=>{this.closeConfirm();onOk()}}
  closeConfirm(){document.getElementById('confirmDialog').classList.remove('show')}
}
const app=new App();
</script>
