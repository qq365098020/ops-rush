<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="运营RUSH">
<meta name="version" content="20260710-1852">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="theme-color" content="#eef7ff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#eef7ff" media="(prefers-color-scheme: dark)">
<title>运营RUSH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --page-bg-color:#d8efff;
  --bg:#eef7ff;--bg2:rgba(255,255,255,.34);
  --page-bg-base:linear-gradient(135deg,#d8efff 0%,#f7fbff 30%,#fbf4df 55%,#eafdf4 78%,#c8eaff 100%);
  --page-bg-mesh:
    conic-gradient(from 210deg at 45% 40%, rgba(0,122,255,.22), rgba(255,204,0,.18), rgba(52,199,89,.18), rgba(175,82,222,.16), rgba(0,122,255,.22)),
    linear-gradient(118deg, rgba(255,255,255,.4), rgba(255,255,255,0) 34%, rgba(255,255,255,.34) 68%, rgba(255,255,255,0));
  --page-bg:var(--page-bg-mesh),var(--page-bg-base);
  --glass:linear-gradient(135deg,rgba(255,255,255,.36),rgba(255,255,255,.1));
  --glass2:linear-gradient(135deg,rgba(255,255,255,.48),rgba(255,255,255,.18));
  --glass-fill:rgba(255,255,255,.18);
  --glass-strong:rgba(255,255,255,.32);
  --glass-border:rgba(255,255,255,.52);
  --glass-edge:rgba(255,255,255,.72);
  --glass-shadow:rgba(55,105,140,.1);
  --text:#111318;--text2:rgba(17,19,24,.62);--text3:rgba(17,19,24,.4);
  --red:#ff3b30;--red-bg:rgba(255,59,48,.12);--red-glow:rgba(255,59,48,.2);
  --yellow:#ff9500;--yellow-bg:rgba(255,149,0,.1);--yellow-glow:rgba(255,149,0,.2);
  --green:#34c759;--green-bg:rgba(52,199,89,.12);--green-glow:rgba(52,199,89,.2);
  --blue:#007aff;--blue-bg:rgba(0,122,255,.1);
  --orange:#ff7b00;--orange-bg:rgba(255,123,0,.12);--orange-glow:rgba(255,123,0,.2);
  --purple:#af52de;
  --radius:20px;--radius-sm:16px;
  --safe-top:env(safe-area-inset-top,20px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --viewport-bottom-gap:0px;
  --bottom-nav-safe:max(var(--safe-bottom),var(--viewport-bottom-gap));
  --bottom-nav-height:calc(64px + var(--bottom-nav-safe));
}
@media (hover:none) and (pointer:coarse){
  :root{
    --bottom-nav-safe:max(var(--safe-bottom),var(--viewport-bottom-gap),34px);
  }
}
html{width:100%;height:100%;min-height:100%;margin:0;padding:0;overflow:hidden;background:var(--page-bg),var(--page-bg-color);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
body{width:100%;height:100vh;min-height:100vh;margin:0;padding:0;overflow:hidden;background:var(--page-bg),var(--page-bg-color);display:flex;flex-direction:column;color:var(--text)}

/* iCloud-inspired translucent wallpaper */
body::before{content:'';position:fixed;inset:-64px;background:var(--page-bg-base);z-index:0}
body::after{content:'';position:fixed;inset:-80px;z-index:0;
  background:var(--page-bg-mesh);
  pointer-events:none;
  filter:blur(18px) saturate(1.16);
  animation:wallpaperShift 28s ease-in-out infinite alternate}
@keyframes wallpaperShift{
  0%{transform:translate(0,0) scale(1)}
  50%{transform:translate(20px,-15px) scale(1.05)}
  100%{transform:translate(-15px,10px) scale(.97)}
}

/* App shell */
#app{width:100%;height:100vh;min-height:100vh;margin:0;padding:0 0 var(--bottom-nav-height);box-sizing:border-box;flex:1 1 auto;display:flex;flex-direction:column;position:relative;z-index:1;overflow:hidden;background:transparent}
@supports (height:100lvh){
  body,#app{height:100lvh;min-height:100lvh}
}
@supports not (height:100lvh){
  body,#app{height:-webkit-fill-available;min-height:-webkit-fill-available}
}

/* Header */
.header{padding:calc(var(--safe-top) + 10px) 18px 12px;text-align:left;position:relative;display:grid;grid-template-columns:52px 1fr;grid-template-rows:auto auto;align-items:center;column-gap:12px;background:rgba(255,255,255,.12);backdrop-filter:blur(60px) saturate(2.5) brightness(1.06);-webkit-backdrop-filter:blur(60px) saturate(2.5) brightness(1.06);border-bottom:1px solid rgba(255,255,255,.42);box-shadow:inset 0 -1px 0 rgba(255,255,255,.22),0 10px 30px rgba(76,123,159,.1)}
.header::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.34),rgba(255,255,255,.02));pointer-events:none}
.header .header-logo{width:52px;height:52px;border-radius:15px;grid-row:1/3;display:block;object-fit:cover;box-shadow:inset 0 1px 0 rgba(255,255,255,.72),0 8px 24px rgba(32,120,190,.16)}
.header h1{font-size:28px;font-weight:800;color:var(--text);line-height:1.04;letter-spacing:0;position:relative}
.header .subtitle{font-size:12px;color:var(--text2);margin-top:2px;font-weight:600;letter-spacing:0;position:relative}

/* Pages */
.page{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:14px 16px 12px;display:none;opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s}
.page.active{display:block;opacity:1;transform:translateY(0)}

/* Tab Bar */
.tab-bar{display:flex;gap:6px;margin-bottom:14px;padding:5px;background:var(--glass);backdrop-filter:blur(56px) saturate(2.25);-webkit-backdrop-filter:blur(56px) saturate(2.25);border:1px solid var(--glass-border);border-radius:18px;box-shadow:inset 0 1px 0 var(--glass-edge),0 14px 34px var(--glass-shadow)}
.tab-item{flex:1;text-align:center;padding:10px 4px;border-radius:12px;cursor:pointer;transition:all .3s cubic-bezier(.32,.72,0,1);position:relative}
.tab-item .tab-num{font-size:22px;font-weight:700;display:block;line-height:1.1}
.tab-item .tab-label{font-size:11px;color:var(--text3);margin-top:3px;display:block;transition:color .3s;font-weight:600;letter-spacing:0}
.tab-item.active .tab-label{color:var(--text)}
.tab-item[data-tab="overdue"].active{background:rgba(255,255,255,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 8px 22px rgba(255,59,48,.09)}
.tab-item[data-tab="overdue"] .tab-num{color:var(--red)}
.tab-item[data-tab="upcoming"].active{background:rgba(255,255,255,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 8px 22px rgba(255,149,0,.08)}
.tab-item[data-tab="upcoming"] .tab-num{color:var(--yellow)}
.tab-item[data-tab="done"].active{background:rgba(255,255,255,.22);box-shadow:inset 0 1px 0 rgba(255,255,255,.6),0 8px 22px rgba(52,199,89,.08)}
.tab-item[data-tab="done"] .tab-num{color:var(--green)}

/* Tab content */
.tab-content{position:relative;min-height:120px}
.tab-panel{display:none;animation:tabFadeIn .4s ease both}
.tab-panel.active{display:block}
@keyframes tabFadeIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Sections */
.section{margin-bottom:16px}
.section-header{display:flex;align-items:center;gap:8px;padding:8px 2px;cursor:pointer;user-select:none}
.section-header .icon{font-size:18px}
.section-header .title{font-size:14px;font-weight:700;letter-spacing:0}
.section-header .count{font-size:11px;background:rgba(255,255,255,.2);backdrop-filter:blur(24px) saturate(1.8);-webkit-backdrop-filter:blur(24px) saturate(1.8);padding:2px 8px;border:1px solid rgba(255,255,255,.4);border-radius:10px;color:var(--text2);font-weight:700}
.section-header .arrow{margin-left:auto;font-size:12px;color:var(--text3);transition:transform .3s}
.section-header.collapsed .arrow{transform:rotate(-90deg)}
.section-body{transition:max-height .4s ease,opacity .3s;overflow:hidden}
.section-header.collapsed+.section-body{max-height:0!important;opacity:0}

/* Task cards */
.task-card{background:var(--glass);backdrop-filter:blur(58px) saturate(2.25) brightness(1.05);-webkit-backdrop-filter:blur(58px) saturate(2.25) brightness(1.05);border:1px solid var(--glass-border);border-radius:var(--radius);padding:13px 14px;margin-bottom:9px;cursor:pointer;transition:transform .2s,box-shadow .2s,background .2s;position:relative;overflow:hidden;display:flex;align-items:center;gap:10px;box-shadow:inset 0 1px 0 var(--glass-edge),inset 0 -1px 0 rgba(255,255,255,.18),0 16px 34px rgba(56,99,128,.13)}
.task-card:active{transform:scale(.97)}
.task-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3.5px;border-radius:var(--radius) 0 0 var(--radius)}
.task-card.severity-red::before,.task-card.severity-yellow::before,.task-card.severity-green::before{background:linear-gradient(180deg,var(--orange),#ff9f40)}
.task-card::after{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(115deg,rgba(255,255,255,.28),transparent 38%,rgba(255,255,255,.06) 70%);opacity:.56;pointer-events:none}
.task-card.overdue{border-color:rgba(255,168,80,.5);box-shadow:inset 0 1px 0 var(--glass-edge),0 16px 36px rgba(255,123,0,.14)}
.task-card.overdue.severity-red{animation:pulse-orange 2.8s ease-in-out infinite}
@keyframes pulse-orange{0%,100%{box-shadow:inset 0 1px 0 var(--glass-edge),0 16px 36px rgba(255,123,0,.14)}50%{box-shadow:inset 0 1px 0 var(--glass-edge),0 18px 42px rgba(255,123,0,.24)}}

.card-body{flex:1;min-width:0;position:relative;z-index:1}
.task-card .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.task-card .card-name{font-size:14px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.task-card .card-mid{min-height:10px;margin-bottom:4px}
.task-card .card-bot{text-align:right}
.task-card .card-row{display:flex;align-items:center;justify-content:space-between;min-height:18px}
.task-card .prog-bar{display:flex;gap:6px;align-items:center}
.task-card .prog-dot{width:10px;height:10px;border-radius:3px;display:inline-block;flex-shrink:0;border:1.5px solid rgba(17,19,24,.42);background:rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.7)}
.task-card .prog-on{background:var(--green);border-color:var(--green);box-shadow:0 0 4px var(--green)}
.task-card .prog-off{border-color:rgba(17,19,24,.34);background:rgba(255,255,255,.12)}
.task-card .card-tag{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;white-space:nowrap;margin-left:6px;flex-shrink:0}
.severity-red .card-tag,.severity-yellow .card-tag,.severity-green .card-tag{background:var(--orange-bg);color:var(--orange)}
.task-card .card-meta{display:flex;justify-content:space-between;align-items:center}
.task-card .card-due{font-size:11px;color:var(--text3);font-weight:500}
.task-card .card-countdown{font-size:11px;font-weight:600}
.task-card .card-countdown.overdue-text{color:var(--orange)}
.task-card .card-countdown.soon-text{color:var(--orange)}
.task-card .card-countdown.ok-text{color:var(--text3)}
/* 严重等级匹配：倒计时文字颜色跟随横条光晕 */
.task-card.severity-red .card-countdown.ok-text,
.task-card.severity-red .card-countdown.soon-text{color:var(--orange)}
.task-card.severity-yellow .card-countdown.ok-text,
.task-card.severity-yellow .card-countdown.soon-text{color:var(--orange)}




/* Quick complete button */
.card-done-btn{width:36px;height:36px;border-radius:50%;border:1px solid rgba(52,199,89,.34);background:rgba(255,255,255,.16);backdrop-filter:blur(30px) saturate(2);-webkit-backdrop-filter:blur(30px) saturate(2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;cursor:pointer;font-size:15px;color:var(--green);position:relative;z-index:1;box-shadow:inset 0 1px 0 rgba(255,255,255,.56),0 8px 20px rgba(52,199,89,.08)}
.card-done-btn:active{transform:scale(.85);background:rgba(52,199,89,.25);border-color:var(--green)}
.done-card .card-done-btn{opacity:.3;pointer-events:none}

/* Done card */
.done-card{opacity:.55}
.done-card .card-name{text-decoration:line-through}

/* ===== Detail Modal — 居中缩放，更慢的动画 ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(235,247,255,.08);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .7s ease}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:linear-gradient(135deg,rgba(255,255,255,.46),rgba(255,255,255,.16));backdrop-filter:blur(72px) saturate(2.4) brightness(1.06);-webkit-backdrop-filter:blur(72px) saturate(2.4) brightness(1.06);border:1px solid rgba(255,255,255,.62);border-radius:24px;width:calc(100% - 36px);max-width:420px;max-height:82vh;overflow-y:auto;padding:24px 20px calc(var(--safe-bottom) + 20px);transform:scale(.78);opacity:0;transition:transform .8s cubic-bezier(.22,.68,0,1),opacity .7s ease;box-shadow:inset 0 1px 0 rgba(255,255,255,.78),inset 0 -1px 0 rgba(255,255,255,.16),0 24px 70px rgba(55,101,137,.16)}
.modal-overlay.show .modal{transform:scale(1);opacity:1}
.modal-close-icon{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(26px) saturate(1.9);-webkit-backdrop-filter:blur(26px) saturate(1.9);border:1px solid rgba(255,255,255,.44);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:var(--text3);transition:background .2s;box-shadow:inset 0 1px 0 rgba(255,255,255,.56)}
.modal-close-icon:active{background:rgba(255,255,255,.42)}
.modal-title{font-size:20px;font-weight:700;margin-bottom:4px;padding-right:36px;color:var(--text)}
.modal-type{font-size:12px;color:var(--text3);margin-bottom:16px;font-weight:500}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0;margin-bottom:8px}
.modal-info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--glass);backdrop-filter:blur(46px) saturate(2);-webkit-backdrop-filter:blur(46px) saturate(2);border:1px solid var(--glass-border);border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.56)}
.modal-info-row .label{font-size:13px;color:var(--text2)}
.modal-info-row .value{font-size:14px;font-weight:600}
.modal-note{background:var(--glass);backdrop-filter:blur(46px) saturate(2);-webkit-backdrop-filter:blur(46px) saturate(2);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;box-shadow:inset 0 1px 0 rgba(255,255,255,.56)}
.modal-btn{width:100%;padding:14px;border-radius:var(--radius-sm);font-size:15px;font-weight:700;border:none;cursor:pointer;margin-bottom:8px;transition:transform .15s,opacity .15s;box-shadow:inset 0 1px 0 rgba(255,255,255,.34),0 10px 24px rgba(55,101,137,.12)}
.modal-btn:active{transform:scale(.97);opacity:.8}
.btn-complete{background:linear-gradient(135deg,#34c759,#28a745);color:#fff}
.btn-undo{background:linear-gradient(135deg,#ff9500,#ff6b00);color:#fff}
.btn-reset{background:linear-gradient(135deg,#007aff,#5856d6);color:#fff}


.btn-close{background:var(--glass);color:var(--text2);border:1px solid var(--glass-border);backdrop-filter:blur(34px) saturate(1.8);-webkit-backdrop-filter:blur(34px) saturate(1.8)}
.btn-delete{background:rgba(255,59,48,.08);color:var(--red);border:1px solid rgba(255,59,48,.15)}

/* Settings */
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:var(--glass);backdrop-filter:blur(52px) saturate(2.2);-webkit-backdrop-filter:blur(52px) saturate(2.2);border:1px solid var(--glass-border);border-radius:var(--radius-sm);margin-bottom:9px;cursor:pointer;transition:background .2s;box-shadow:inset 0 1px 0 var(--glass-edge),0 14px 32px rgba(56,99,128,.1)}
.setting-item:active{background:var(--glass2)}
.setting-item .setting-label{font-size:14px;font-weight:500}
.setting-item .setting-desc{font-size:11px;color:var(--text3);margin-top:2px}
.setting-item .setting-arrow{color:var(--text3);font-size:14px}
.setting-group-title{font-size:11px;font-weight:800;color:var(--text3);letter-spacing:0;margin:20px 2px 8px;text-transform:uppercase}

/* Bottom nav */
.bottom-nav{display:flex;justify-content:space-around;align-items:center;height:var(--bottom-nav-height);padding:0 16px;background:transparent;backdrop-filter:none;-webkit-backdrop-filter:none;border:none;position:absolute;bottom:0;left:0;right:0;z-index:50;box-shadow:none;pointer-events:none}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 20px;cursor:pointer;transition:all .25s;opacity:.42;border-radius:16px;background:rgba(255,255,255,.08);backdrop-filter:blur(36px) saturate(2);-webkit-backdrop-filter:blur(36px) saturate(2);pointer-events:auto}
.nav-item.active{opacity:1;background:rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.52),0 8px 22px rgba(55,101,137,.08)}
.nav-item:active{transform:scale(.92)}
.nav-item .nav-icon{font-size:22px}
.nav-item .nav-label{font-size:10px;font-weight:700;letter-spacing:0}

/* Toast */
.toast{position:fixed;top:calc(var(--safe-top) + 10px);left:50%;transform:translateX(-50%) translateY(-80px);background:linear-gradient(135deg,rgba(255,255,255,.48),rgba(255,255,255,.18));backdrop-filter:blur(58px) saturate(2.25);-webkit-backdrop-filter:blur(58px) saturate(2.25);border:1px solid var(--glass-border);border-radius:var(--radius-sm);padding:12px 20px;font-size:14px;font-weight:600;z-index:200;transition:transform .4s cubic-bezier(.32,.72,0,1);white-space:nowrap;box-shadow:inset 0 1px 0 var(--glass-edge),0 14px 34px rgba(55,101,137,.14)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty .empty-icon{font-size:40px;margin-bottom:12px}
.empty .empty-text{font-size:14px;font-weight:500}

/* Review */
.review-item{padding:10px 14px;background:var(--glass);backdrop-filter:blur(44px) saturate(2);-webkit-backdrop-filter:blur(44px) saturate(2);border:1px solid var(--glass-border);border-radius:var(--radius-sm);margin-bottom:6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.72)}
.review-item .review-date{font-size:11px;color:var(--text3)}
.review-item .review-note{font-size:13px;margin-top:4px;color:var(--text)}

/* Mini calendar (read-only completion history) */
.mini-cal{background:rgba(255,255,255,.14);backdrop-filter:blur(38px) saturate(1.8);-webkit-backdrop-filter:blur(38px) saturate(1.8);border:1px solid rgba(255,255,255,.42);border-radius:14px;padding:10px 12px;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.56)}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.mini-cal-header .mini-cal-title{font-size:13px;font-weight:600;color:var(--text2);text-align:center;flex:1}
.mini-cal-nav{width:24px;height:24px;border-radius:50%;border:1px solid rgba(255,255,255,.38);background:rgba(255,255,255,.16);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;color:var(--blue);transition:all .2s;flex-shrink:0}
.mini-cal-nav:active{background:rgba(0,122,255,.2);transform:scale(.85)}
.mini-cal-nav:disabled{opacity:.2;cursor:default}
.mini-cal-grid{transition:transform .6s cubic-bezier(.32,.72,0,1),opacity .35s ease}
.mini-cal-grid.slide-left{animation:slideLeft .6s cubic-bezier(.32,.72,0,1) both}
.mini-cal-grid.slide-right{animation:slideRight .6s cubic-bezier(.32,.72,0,1) both}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
.mini-cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;margin-bottom:4px}
.mini-cal-weekdays span{font-size:10px;font-weight:600;color:var(--text3)}
.mini-cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center}
.mini-cal-day{font-size:11px;line-height:22px;width:22px;height:22px;margin:0 auto;border-radius:50%;color:var(--text)}
.mini-cal-day.other{color:var(--text3);opacity:.3}
.mini-cal-day.today{font-weight:700;position:relative}
